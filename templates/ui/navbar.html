
<head>
    {% load static %}
    <link rel="stylesheet" href="{% static 'ui/navbar.css' %}">
</head>

<body>

<nav class="navbar">
    <div class="logo"><a href="{% url "home" %}" class='web-title'>RentalHome</a></div>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <div class="nav-links" id="navLinks">
        <a href="{% url "home" %}">Home</a>
        <a href="{% url "become_host" %}" class="host-btn">Become a Host</a>
        <a href="{% url "about_us" %}" >About Us</a>
        {% if user.is_authenticated %}
            <a href="{% url 'subscriptions' %}" class="subscribe-btn">
                <i class="fa-solid fa-crown"></i> View Plans
            </a>
            <a href="{% url "logout" %}">Logout</a>
        {% else %}
            <a href="{% url "login" %}">Login</a>
            <a href="{% url "signup" %}">SignUp</a>
        {% endif %}

        {% if user.is_authenticated %}
        <div class="profile" onclick="toggleDropdown(event)">
            
            <a href="{% url "profile" request.user.id %}">
                <img src="{% if user.profile.image %}{{ user.profile.image.url }}{% else %}{% static "media/default.avif" %}{% endif %}" alt="profile-img">
            </a>
        </div>
        {% endif %}
    </div>
</nav>

<script>
function toggleMenu() {
    document.getElementById("navLinks").classList.toggle("active");
}

function toggleDropdown(event) {
    event.stopPropagation();
    document.querySelector(".profile").classList.toggle("active");
}

// Close dropdown when clicking outside
window.onclick = function() {
    document.querySelector(".profile").classList.remove("active");
}
</script>

</body>
</html>
