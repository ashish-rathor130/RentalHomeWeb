{% extends "base.html" %}
{% block title %}Payment{% endblock title %}

{% block content %}
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        .payment-body {

            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .payment-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 95%;
            border: 2px solid #ddd;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .plan {
            text-align: center;
            margin-bottom: 20px;
        }

        .plan h3 {
            color: #4facfe;
        }

        .amount {
            font-size: 28px;
            text-align: center;
            margin: 15px 0;
        }

        .payment-methods {
            margin: 20px 0;
        }

        .method {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .method:hover {
            background: #f5f5f5;
        }

        .method i {
            margin-right: 10px;
            color: #4facfe;
        }

        .pay-btn {
            width: 100%;
            padding: 12px;
            background: #4facfe;
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .pay-btn:hover {
            background: #007bff;
        }

        .secure {
            text-align: center;
            margin-top: 10px;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>

<div class="payment-body">

<div class="payment-box">

    <h2><i class="fa-solid fa-credit-card"></i> Payment</h2>

    <div class="plan">
        <h3>{{ plan|title }} Plan</h3>
    </div>

    <div class="amount">
        ₹{{ amount }}
    </div>

    <div class="payment-methods">
        <div class="method">
            <i class="fa-solid fa-university"></i> UPI
        </div>
        <div class="method">
            <i class="fa-solid fa-credit-card"></i> Card
        </div>
        <div class="method">
            <i class="fa-solid fa-wallet"></i> Wallet
        </div>
    </div>

    <!-- Dummy Payment Button -->
    <a href="{% url 'home' %}">
        <button class="pay-btn">
            <i class="fa-solid fa-lock"></i> Pay Securely
        </button>
    </a>

    <p class="secure">🔒 100% Secure Payment (Demo)</p>

</div>

</div>
{% endblock %}
