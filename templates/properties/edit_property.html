{% extends "base.html" %}
{% block title %}Edit Property{% endblock title %}
{% block content %}
    <style>
        .edit-property {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
        }

        .form-container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        form input, form textarea, form select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #4facfe;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #007bff;
        }

    </style>
</head>

<div class="edit-property">

<div class="form-container">
    <h2>Edit Property</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">
            <i class="fa-solid fa-pen"></i> Update Property
        </button>
    </form>
</div>

</div>
{% endblock content %}
