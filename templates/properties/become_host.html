{% extends "base.html" %}
{% block title %}
    Become a Host
{% endblock title %}

{% block content %}
<head>
    {% load static %}
    <link rel="stylesheet" href="{% static 'properties/become_host.css' %}">
</head>
<body>

<div class="container">
    <h2>🏡 List Your Home</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
            <label>Title</label>
            {{ form.title }}
        </div>

        <div class="form-group">
            <label>Description</label>
            {{ form.description }}
        </div>

        <div class="form-group">
            <label>Price (per month)</label>
            {{ form.price }}
        </div>

        <div class="form-group">
            <label>Location</label>
            {{ form.location }}
        </div>

        <div class="form-group">
            <label>Upload Image</label>
            {{ form.image }}
        </div>

        <button type="submit">Add Property</button>
    </form>
</div>

</body>
</html>
{% endblock content %}
