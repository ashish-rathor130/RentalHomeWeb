{% extends "base.html" %}
{% block title %}
Update Profile Image
{% endblock title %}

{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Profile Image</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        .profile-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            
        }

        .card {
            background: rgba(255, 255, 255, 0.12);
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            color: #fff;
            box-shadow: 0 10px 35px rgba(0,0,0,0.25);
        }

        .card h2 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        .image-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.5);
            transition: 0.3s;
        }

        .image-wrapper:hover .profile-img {
            transform: scale(1.05);
            opacity: 0.7;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            transition: 0.3s;
            cursor: pointer;
        }

        .image-wrapper:hover .overlay {
            opacity: 1;
        }

        .overlay span {
            font-size: 14px;
            color: #fff;
        }

        input[type="file"] {
            display: none;
        }

        .upload-box {
            border: 2px dashed rgba(255,255,255,0.5);
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .upload-box:hover {
            background: rgba(255,255,255,0.1);
        }

        .upload-box p {
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            background: #fff;
            color: #333;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #eaeaea;
        }

        @media (max-width: 500px) {
            .card {
                padding: 20px;
            }

            .profile-img,
            .overlay {
                width: 110px;
                height: 110px;
            }
        }
    </style>
</head>

<div class='profile-container'>

<div class="container">
    <div class="card">
        <h2>Update Profile Image</h2>

        <div class="image-wrapper" onclick="document.getElementById('fileInput').click();">
            <img id="preview" src="{{ user.profile.image.url|default:'https://via.placeholder.com/130' }}" class="profile-img">
            <div class="overlay">
                <span>Change</span>
            </div>
        </div>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <input type="file" id="fileInput" name="image" accept="image/*" onchange="previewImage(event)">

            <div class="upload-box" onclick="document.getElementById('fileInput').click();">
                <p>Click or drag image here to upload</p>
            </div>

            <button type="submit" class="btn">Update Image</button>
        </form>
    </div>
</div>

<script>
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function(){
            document.getElementById('preview').src = reader.result;
        };
        reader.readAsDataURL(event.target.files[0]);
    }
</script>

</div>
</html>

{% endblock content %}
