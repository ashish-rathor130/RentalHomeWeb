{% extends "base.html" %}
{% block title %}
Verify Mobile Number
{% endblock title %}

{% block content %}

<head>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    .verify-mobile-body{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .otp-container {
        background: #fff;
        border: 2px solid #4facfe;
        padding: 40px 30px;
        border-radius: 20px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 15px 20px rgba(0,0,0,0.1);
        text-align: center;
        animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .otp-container h2 {
        margin-bottom: 10px;
        color: #333;
    }

    .otp-container p {
        color: #777;
        font-size: 14px;
        margin-bottom: 25px;
    }

    .otp-inputs {
        display: flex;
        justify-content: space-between;
        margin-bottom: 25px;
    }

    .otp-inputs input {
        width: 50px;
        height: 55px;
        border-radius: 12px;
        border: 1px solid #ddd;
        text-align: center;
        font-size: 20px;
        transition: 0.3s;
    }

    .otp-inputs input:focus {
        border-color: #4facfe;
        box-shadow: 0 0 8px rgba(79,172,254,0.3);
        outline: none;
    }

    .verify-btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        color: #fff;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .verify-btn:hover {
        opacity: 0.9;
    }

    .resend {
        margin-top: 15px;
        font-size: 14px;
        color: #666;
    }

    .resend a {
        color: #4facfe;
        text-decoration: none;
        font-weight: 600;
        cursor: pointer;
    }

    .timer {
        color: red;
        font-weight: bold;
    }

    /* Django messages */
    .messages {
        margin-bottom: 15px;
    }

    .messages div {
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 10px;
        font-size: 14px;
    }

    .success {
        background: #e6fffa;
        color: #0f766e;
    }

    .error {
        background: #ffe6e6;
        color: #b91c1c;
    }

    /* Responsive */
    @media(max-width: 480px) {
        .otp-inputs input {
            width: 40px;
            height: 50px;
            font-size: 18px;
        }
    }
</style>
</head>
<div class="verify-mobile-body">

<div class="otp-container">
    <h2>Verify OTP</h2>
    <p>Enter the 6-digit code sent to your mobile</p>

<!-- Django Messages -->
<div class="messages">
    {% for message in messages %}
        <div class="{{ message.tags }}">{{ message }}</div>
    {% endfor %}
</div>

<form method="POST">
    {% csrf_token %}

    <div class="otp-inputs">
        <input type="text" maxlength="1" required>
        <input type="text" maxlength="1" required>
        <input type="text" maxlength="1" required>
        <input type="text" maxlength="1" required>
        <input type="text" maxlength="1" required>
        <input type="text" maxlength="1" required>
    </div>

    <!-- Hidden full OTP -->
    <input type="hidden" name="otp" id="otp">

    <button type="submit" class="verify-btn">Verify</button>
</form>

<div class="resend">
    Didn’t receive code? 
    <a id="resendBtn" style="pointer-events:none; opacity:0.5;">Resend</a><br>
    <span class="timer" id="timer">60s</span>
</div>

</div>

<script>
    const inputs = document.querySelectorAll(".otp-inputs input");
    const hiddenInput = document.getElementById("otp");

    inputs.forEach((input, index) => {
        input.addEventListener("input", (e) => {
            if (e.target.value.length === 1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }

            let otp = "";
            inputs.forEach(i => otp += i.value);
            hiddenInput.value = otp;
        });

        input.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && !input.value && index > 0) {
                inputs[index - 1].focus();
            }
        });
    });

    // Timer
    let time = 60;
    const timerEl = document.getElementById("timer");
    const resendBtn = document.getElementById("resendBtn");

    const countdown = setInterval(() => {
        time--;
        timerEl.innerText = time + "s";

        if (time <= 0) {
            clearInterval(countdown);
            timerEl.innerText = "";
            resendBtn.style.pointerEvents = "auto";
            resendBtn.style.opacity = "1";
        }
    }, 1000);
</script>

</div>

{% endblock content %}
