{% extends "base.html" %}
{% block title %}Send OTP{% endblock title %}
{% block content %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        .verify-mobile-body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
           
        }

        .card {
            background: #fff;
            padding: 30px 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            animation: fadeIn 0.6s ease-in-out;
            border: 2px solid #4facfe;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .card p {
            font-size: 14px;
            color: #777;
            margin-bottom: 20px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 14px;
            color: #555;
            display: block;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
            font-size: 15px;
        }

        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .footer-text {
            margin-top: 15px;
            font-size: 13px;
            color: #888;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 25px 20px;
            }

            .card h2 {
                font-size: 20px;
            }
        }
    </style>
</head>

<div class = "verify-mobile-body">

<div class="container">
    <div class="card">
        <h2>Verify Mobile</h2>
        <p>Enter your mobile number to receive OTP</p>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" name="mobile" placeholder="Enter mobile number" required>
            </div>

            <button type="submit" class="btn">Send OTP</button>
        </form>

        <div class="footer-text">
            We will send a verification code to your phone
        </div>
    </div>
</div>

</div>
</html>
{% endblock %}
